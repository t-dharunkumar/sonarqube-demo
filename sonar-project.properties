# =============================================================
#  SonarQube Cloud — Project Configuration
#  Project : t-dharunkumar_sonarqube-demo
#  Org     : t-dharunkumar
# =============================================================

# ----- Identity -----
sonar.projectKey=t-dharunkumar_sonarqube-demo
sonar.organization=t-dharunkumar
sonar.projectName=SonarQube Demo
sonar.projectVersion=1.0

# ----- Source & Tests -----
sonar.sources=src
sonar.tests=tests
sonar.language=php

# ----- Coverage -----
# Generate coverage.xml with: vendor/bin/phpunit --coverage-clover coverage.xml
sonar.php.coverage.reportPaths=coverage.xml

# ----- Encoding -----
sonar.sourceEncoding=UTF-8

# ----- Exclusions -----
# Exclude vendor/third-party code from analysis
sonar.exclusions=vendor/**
